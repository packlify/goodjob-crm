version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_please_change
      MYSQL_DATABASE: goodjob_crm
      MYSQL_USER: goodjob
      MYSQL_PASSWORD: change_me
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "4188:4188"
    environment:
      NODE_ENV: production
      PORT: "4188"
      CRM_STORE: mysql
      DATABASE_URL: mysql://goodjob:change_me@db:3306/goodjob_crm
      JWT_SECRET: replace_with_a_strong_random_secret_at_least_40_chars
      INITIAL_ADMIN_EMAIL: admin@example.com
      INITIAL_ADMIN_PASSWORD: change_me_admin_123
      INITIAL_ADMIN_NAME: Super Admin
      SESSION_COOKIE_SECURE: "false"
      CORS_ORIGINS: "*"
      ENABLE_API_DOCS: "true"
    depends_on:
      db:
        condition: service_healthy
